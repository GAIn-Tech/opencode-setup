name: opencode-cli-v2-ci

on:
  push:
    paths:
      - 'opencode-cli-v2/**'
  pull_request:
    paths:
      - 'opencode-cli-v2/**'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: opencode-cli-v2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Run tests
        run: bun test
